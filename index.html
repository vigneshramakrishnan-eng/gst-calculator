<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>

<style>
body{
    font-family: Calibri, Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

table{
    border-collapse:collapse;
    width:700px;
    background:#fff;
    margin:auto;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

th{
    background:#4CAF50;
    color:#fff;
    padding:12px;
    font-size:22px;
}

td{
    border:1px solid #ccc;
    padding:10px;
}

input,select{
    width:100%;
    padding:8px;
    font-size:15px;
    box-sizing:border-box;
}

.result{
    background:#f8f8f8;
}

.result td:first-child{
    font-weight:bold;
}

.text-right{
    text-align:right;
}

.header{
    background:#d9ead3;
    font-weight:bold;
    text-align:center;
}

input:focus,select:focus{
    outline:none;
    border:2px solid #4CAF50;
}
</style>
</head>
<body>

<table>

<tr>
    <th colspan="3">GST Calculator</th>
</tr>

<tr>
    <td>Amount (₹)</td>
    <td colspan="2">
        <input type="number" id="amount" placeholder="Enter Amount" oninput="calculate()">
    </td>
</tr>

<tr>
    <td>Count</td>
    <td colspan="2">
        <input type="number" id="count" value="1" min="1" step="1" oninput="calculate()">
    </td>
</tr>

<tr>
    <td>GST Type</td>
    <td colspan="2">
        <select id="type" onchange="calculate()">
            <option value="exclude">GST Exclude (Add GST)</option>
            <option value="include" selected>GST Include (Remove GST)</option>
        </select>
    </td>
</tr>

<tr>
    <td>GST Rate</td>
    <td colspan="2">
        <select id="rate" onchange="calculate()">
            <option value="0">0%</option>
            <option value="3">3%</option>
            <option value="5" selected>5%</option>
            <option value="12">12%</option>
            <option value="18">18%</option>
            <option value="28">28%</option>
            <option value="40">40%</option>
            <option value="50">50%</option>
            <option value="100">100%</option>
        </select>
    </td>
</tr>

<tr class="header">
    <td>Field</td>
    <td>2 Decimal</td>
    <td>6 Decimal</td>
</tr>

<tr class="result">
    <td>Base Amount</td>
    <td class="text-right" id="base2">₹ 0.00</td>
    <td class="text-right" id="base6">₹ 0.000000</td>
</tr>

<tr class="result">
    <td>GST Amount</td>
    <td class="text-right" id="gst2">₹ 0.00</td>
    <td class="text-right" id="gst6">₹ 0.000000</td>
</tr>

<tr class="result">
    <td>CGST</td>
    <td class="text-right" id="cgst2">₹ 0.00</td>
    <td class="text-right" id="cgst6">₹ 0.000000</td>
</tr>

<tr class="result">
    <td>SGST</td>
    <td class="text-right" id="sgst2">₹ 0.00</td>
    <td class="text-right" id="sgst6">₹ 0.000000</td>
</tr>

<tr class="result">
    <td>Total Amount</td>
    <td class="text-right" id="total2">₹ 0.00</td>
    <td class="text-right" id="total6">₹ 0.000000</td>
</tr>

</table>

<script>
function calculate(){

    let amount = parseFloat(document.getElementById("amount").value) || 0;
    let count = parseFloat(document.getElementById("count").value) || 1;
    amount = amount * count;
    let rate = parseFloat(document.getElementById("rate").value);
    let type = document.getElementById("type").value;

    let base = 0;
    let gst = 0;
    let total = 0;

    if(type === "exclude"){
        // GST Excluded (Add GST)
        base = amount;
        gst = base * rate / 100;
        total = base + gst;
    }else{
        // GST Included (Extract GST)
        total = amount;
        base = total / (1 + rate / 100);
        gst = total - base;
    }

    let cgst = gst / 2;
    let sgst = gst / 2;

    // 2 Decimal
    document.getElementById("base2").innerHTML = "₹ " + base.toFixed(2);
    document.getElementById("gst2").innerHTML = "₹ " + gst.toFixed(2);
    document.getElementById("cgst2").innerHTML = "₹ " + cgst.toFixed(2);
    document.getElementById("sgst2").innerHTML = "₹ " + sgst.toFixed(2);
    document.getElementById("total2").innerHTML = "₹ " + total.toFixed(2);

    // 6 Decimal
    document.getElementById("base6").innerHTML = "₹ " + base.toFixed(6);
    document.getElementById("gst6").innerHTML = "₹ " + gst.toFixed(6);
    document.getElementById("cgst6").innerHTML = "₹ " + cgst.toFixed(6);
    document.getElementById("sgst6").innerHTML = "₹ " + sgst.toFixed(6);
    document.getElementById("total6").innerHTML = "₹ " + total.toFixed(6);
}
</script>

</body>
</html>
